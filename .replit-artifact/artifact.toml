kind = "web"
previewPath = "/"
title = "Wanderly Trails"
version = "1.0.0"
id = "artifacts/wanderly-trails"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25981

[services.development]
run = "pnpm --filter @workspace/wanderly-trails run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wanderly-trails", "run", "build" ]
publicDir = "artifacts/wanderly-trails/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25981"
BASE_PATH = "/"
